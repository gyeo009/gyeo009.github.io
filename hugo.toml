  introBody = "DB 접근제어 프록시, Kotlin 기반 MCP 서버, LLM chat middleware를 만들고 운영하며 배운 점을 정리합니다. 내부 정보는 덜어내고, 남는 판단과 원칙을 남깁니다."
  roleLine = "Backend Engineer working on security, AI systems, and production-minded software."
  email = "hello@gyeo009.dev"
  github = "https://github.com/gyeo009"
  accent = "#2f6fed"
  contentLicense = "Unless otherwise noted, writing on this site is All Rights Reserved."
  topics = ["Backend", "AI Systems", "Database", "Architecture", "Operations"]

