baseURL = "https://gyeo009.github.io/"
languageCode = "ko-KR"
title = "Mind over matter"
enableRobotsTXT = true
summaryLength = 28

[pagination]
  pagerSize = 8

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[permalinks]
  posts = "/posts/:slugorcontentbasename/"

[taxonomies]
  tag = "tags"
  topic = "topics"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false
    style = "github-dark"

[params]
  author = "Hyodae Kim"
  description = "실무에서 얻은 판단과 감각을 기록하는 백엔드 개발자 블로그"
