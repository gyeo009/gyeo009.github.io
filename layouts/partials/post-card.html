<article class="post-card">
  <div class="card-body">
    <div class="card-main">
      <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      {{ with .Params.tags }}
        <ul class="card-tags">
          {{ range first 3 . }}
            <li>{{ . }}</li>
          {{ end }}
        </ul>
      {{ end }}
    </div>
    <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "January 2, 2006" }}</time>
  </div>
</article>
